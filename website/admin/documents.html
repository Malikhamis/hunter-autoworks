<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Documents — Hunter Auto</title>
    <link rel="stylesheet" href="styles-clean.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" role="navigation" aria-label="Main navigation">
        <div class="brand">
          <img src="../images/logo.jpg" alt="logo" width="36" height="36" onerror="this.style.display='none'" />
          <div>
            <div style="font-weight:900">Hunter Auto</div>
            <div class="small">Admin</div>
          </div>
        </div>

        <nav class="nav">
          <a href="dashboard.html">Dashboard</a>
          <a href="documents.html" class="active">Documents</a>
          <a href="invoices.html">Invoices</a>
          <a href="clients.html">Clients</a>
          <a href="services.html">Services</a>
          <a href="reports.html">Reports</a>
          <a href="settings.html">Settings</a>
        </nav>

        <div class="small">v1.0 · Local-first · Supabase</div>
      </aside>

      <main class="main-area">
        <header class="topbar"><div class="left"><h1>Documents</h1></div><div class="actions"><button id="btn-new-doc">New</button></div></header>
        <section style="padding:18px">
          <p>Manage Estimates, Quotations, Proformas and Invoices from here.</p>
          <div id="documents-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-top:12px"></div>
        </section>
      </main>
    </div>

    <script src="admin.js"></script>
    <script>
      // placeholder: admin.js will hook into #documents-grid via getDocuments()/render
      document.getElementById('btn-new-doc').addEventListener('click',()=>{if(typeof openDocumentEditor==='function') openDocumentEditor(); else alert('Open new document editor (TBD)')})
    </script>
  </body>
</html>
