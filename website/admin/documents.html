<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Documents — Hunter Auto Admin</title>
  <link rel="stylesheet" href="/admin/styles-clean.css" />
</head>
<body>
  <div class="app-shell">
    <main class="main-area">
      <section class="main-content">
        <div class="page-header">
          <h1>Documents</h1>
          <button class="action-btn" id="newDocBtn">+ New Document</button>
        </div>
        <div class="toolbar">
          <select id="docTypeFilter" class="toolbar-select" aria-label="Filter by type">
            <option value="">All Types</option>
            <option value="estimate">Estimate</option>
            <option value="quote">Quotation</option>
            <option value="proforma">Proforma</option>
            <option value="invoice">Invoice</option>
          </select>
        </div>
        <div class="documents-grid" id="documentsGrid">
          <div class="empty-state">
            <div class="empty-state-icon">📄</div>
            <div class="empty-state-title">Loading documents…</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- New Document Modal -->
  <div class="modal-overlay" id="docModal" role="dialog" aria-modal="true"
       aria-labelledby="docModalTitle" style="display:none">
    <div class="modal-panel modal-panel-lg">
      <div class="modal-header">
        <h2 id="docModalTitle">New Document</h2>
        <button class="modal-close" id="docModalClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label for="docType">Document Type</label>
            <select id="docType">
              <option value="estimate">Estimate</option>
              <option value="quote">Quotation</option>
              <option value="proforma">Proforma Invoice</option>
              <option value="invoice" selected>Invoice</option>
            </select>
          </div>
          <div class="form-group">
            <label for="docDate">Date</label>
            <input type="date" id="docDate" />
          </div>
          <div class="form-group form-grid-full">
            <label for="docCustomer">Customer Name *</label>
            <input type="text" id="docCustomer" placeholder="Customer name" required />
          </div>
        </div>

        <div style="margin-top:1rem;">
          <h3 class="section-title">Select Services</h3>
          <div id="docServicesContainer" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.5rem;"></div>
        </div>

        <div style="margin-top:1rem;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
            <h3 class="section-title" style="margin:0;">Custom Items</h3>
            <button type="button" class="compact-btn compact-btn-outline" id="addCustomItemBtn">+ Add</button>
          </div>
          <div id="customItemsContainer"></div>
        </div>

        <div class="line-items-total" style="margin-top:1rem;">
          <span>Document Total:</span>
          <strong id="docTotalDisplay">TSh 0</strong>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="compact-btn compact-btn-outline" id="docModalCancel">Cancel</button>
        <button type="button" class="action-btn" id="saveDocBtn">Generate &amp; Save</button>
      </div>
    </div>
  </div>

  <!-- Document Preview Modal -->
  <div class="modal-overlay" id="previewModal" role="dialog" aria-modal="true" style="display:none">
    <div class="modal-panel modal-panel-lg">
      <div class="modal-header">
        <h2>Document Preview</h2>
        <button class="modal-close" id="previewModalClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="previewContent"></div>
      <div class="modal-footer">
        <button type="button" class="compact-btn compact-btn-outline" id="previewModalCloseBtn">Close</button>
        <button type="button" class="action-btn" id="downloadPdfBtn">📄 Download PDF</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="/admin/api.js"></script>
  <script src="/admin/layout.js"></script>
  <script src="/admin/admin.js"></script>
  <script>
    var allDocs = [];
    var allServices = [];
    var currentPreviewHtml = '';

    async function loadDocumentsPage() {
      var grid = document.getElementById('documentsGrid');
      grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⏳</div><div class="empty-state-title">Loading…</div></div>';
      try {
        var results = await Promise.all([
          window.api.get('/documents'),
          window.api.get('/services')
        ]);
        allDocs = results[0];
        allServices = results[1];
        window._services = allServices;
        renderDocumentsGrid(allDocs);
        populateServicesCheckboxes();
      } catch (err) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Failed to load: ' + escapeHtml(err.message) + '</div></div>';
      }
    }

    function renderDocumentsGrid(docs) {
      var grid = document.getElementById('documentsGrid');
      if (!docs.length) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📄</div><div class="empty-state-title">No documents yet</div><div class="empty-state-description">Click New Document to create your first estimate, quote, or invoice.</div></div>';
        return;
      }
      var typeColors = { invoice:'badge-primary', estimate:'badge-purple', quote:'badge-success', proforma:'badge-warning' };
      grid.innerHTML = docs.map(function(doc) {
        var date = doc.doc_date ? new Date(doc.doc_date).toLocaleDateString() : new Date(doc.created_at).toLocaleDateString();
        var services = Array.isArray(doc.services) ? doc.services : (typeof doc.services === 'string' ? JSON.parse(doc.services || '[]') : []);
        var total = services.reduce(function(s, i) { return s + (i.price || i.amount || 0); }, 0);
        var badgeCls = typeColors[doc.type] || 'badge-primary';
        return '<div class="document-card">' +
          '<div class="document-card-header">' +
            '<span class="badge ' + badgeCls + '">' + escapeHtml((doc.type||'invoice').toUpperCase()) + '</span>' +
            '<span class="document-card-id">' + escapeHtml(doc.doc_id || String(doc.id)) + '</span>' +
          '</div>' +
          '<div class="document-card-customer">' + escapeHtml(doc.customer) + '</div>' +
          '<div class="document-card-date">' + date + ' · TSh ' + Number(total).toLocaleString() + '</div>' +
          '<div class="document-card-actions">' +
            '<button class="btn-table-action btn-view" onclick="previewDoc(\'' + escapeHtml(String(doc.doc_id || doc.id)) + '\')">Preview</button>' +
            '<button class="btn-table-action btn-delete" onclick="deleteDocById(\'' + escapeHtml(String(doc.doc_id || doc.id)) + '\')">Delete</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    // Type filter
    document.getElementById('docTypeFilter').addEventListener('change', function() {
      var type = this.value;
      var filtered = type ? allDocs.filter(function(d) { return d.type === type; }) : allDocs;
      renderDocumentsGrid(filtered);
    });

    function populateServicesCheckboxes() {
      var container = document.getElementById('docServicesContainer');
      container.innerHTML = allServices.map(function(s) {
        return '<label style="display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--gray-200);border-radius:var(--radius-md);cursor:pointer;">' +
          '<input type="checkbox" class="doc-svc-cb" data-price="' + (s.price||0) + '" data-name="' + escapeHtml(s.name) + '" />' +
          '<span>' + escapeHtml(s.name) + ' — TSh ' + Number(s.price||0).toLocaleString() + '</span>' +
        '</label>';
      }).join('');
      container.querySelectorAll('.doc-svc-cb').forEach(function(cb) {
        cb.addEventListener('change', updateDocTotal);
      });
    }

    var customItemCount = 0;
    document.getElementById('addCustomItemBtn').addEventListener('click', function() {
      customItemCount++;
      var id = 'ci-' + customItemCount;
      var div = document.createElement('div');
      div.id = id;
      div.style.display = 'flex';
      div.style.gap = '8px';
      div.style.marginBottom = '8px';
      div.innerHTML = '<input type="text" class="ci-desc toolbar-search" placeholder="Description" style="flex:1;" />' +
        '<input type="number" class="ci-amount toolbar-search" placeholder="Amount (TSh)" style="width:150px;" min="0" />' +
        '<button type="button" class="btn-table-action btn-delete ci-remove">✕</button>';
      document.getElementById('customItemsContainer').appendChild(div);
      div.querySelector('.ci-amount').addEventListener('input', updateDocTotal);
      div.querySelector('.ci-remove').addEventListener('click', function() { div.remove(); updateDocTotal(); });
    });

    function updateDocTotal() {
      var total = 0;
      document.querySelectorAll('.doc-svc-cb:checked').forEach(function(cb) {
        total += parseInt(cb.getAttribute('data-price')) || 0;
      });
      document.querySelectorAll('.ci-amount').forEach(function(inp) {
        total += parseFloat(inp.value) || 0;
      });
      document.getElementById('docTotalDisplay').textContent = 'TSh ' + total.toLocaleString();
    }

    function openNewDocModal() {
      document.getElementById('docModalTitle').textContent = 'New Document';
      document.getElementById('docType').value = 'invoice';
      document.getElementById('docDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('docCustomer').value = '';
      document.querySelectorAll('.doc-svc-cb').forEach(function(cb) { cb.checked = false; });
      document.getElementById('customItemsContainer').innerHTML = '';
      customItemCount = 0;
      updateDocTotal();
      document.getElementById('docModal').style.display = 'flex';
    }

    function closeDocModal() { document.getElementById('docModal').style.display = 'none'; }
    document.getElementById('docModalClose').addEventListener('click', closeDocModal);
    document.getElementById('docModalCancel').addEventListener('click', closeDocModal);
    document.getElementById('docModal').addEventListener('click', function(e) { if (e.target === this) closeDocModal(); });

    document.getElementById('saveDocBtn').addEventListener('click', async function() {
      var customer = document.getElementById('docCustomer').value.trim();
      if (!customer) { showToast('Customer name is required', 'error'); return; }
      var type = document.getElementById('docType').value;
      var date = document.getElementById('docDate').value;

      var services = [];
      document.querySelectorAll('.doc-svc-cb:checked').forEach(function(cb) {
        services.push({ name: cb.getAttribute('data-name'), price: parseInt(cb.getAttribute('data-price')) || 0 });
      });
      document.querySelectorAll('#customItemsContainer > div').forEach(function(div) {
        var desc = div.querySelector('.ci-desc').value.trim();
        var amount = parseFloat(div.querySelector('.ci-amount').value) || 0;
        if (desc && amount) services.push({ name: desc, price: amount });
      });

      if (!services.length) { showToast('Please select at least one service or add a custom item', 'error'); return; }

      var docId = type.slice(0,3).toUpperCase() + '-' + Date.now();
      var settings = JSON.parse(localStorage.getItem('business_settings') || '{}');
      var bizName = settings.name || 'Hunter Autoworks';
      var bizPhone = settings.phone || '+255 627 629 345';
      var bizAddress = settings.address || 'Dar es Salaam, Tanzania';

      var html = generateDocHtml({ id: docId, type: type, customer: customer, date: date, services: services, bizName: bizName, bizPhone: bizPhone, bizAddress: bizAddress });

      try {
        await window.api.post('/documents', {
          doc_id: docId,
          type: type,
          customer: customer,
          doc_date: date || null,
          services: services,
          html: html
        });
        showToast('Document saved successfully', 'success');
        closeDocModal();
        loadDocumentsPage();
      } catch (err) {
        showToast('Error saving document: ' + err.message, 'error');
      }
    });

    function generateDocHtml(opts) {
      var title = { invoice:'INVOICE', estimate:'ESTIMATE', quote:'QUOTATION', proforma:'PROFORMA INVOICE' }[opts.type] || 'INVOICE';
      var total = opts.services.reduce(function(s, i) { return s + (i.price||0); }, 0);
      var rows = opts.services.map(function(s) {
        return '<tr><td style="padding:10px;border-bottom:1px solid #eef2f7;">' + escapeHtml(s.name) + '</td><td style="padding:10px;border-bottom:1px solid #eef2f7;text-align:right;font-weight:700;">TSh ' + Number(s.price||0).toLocaleString() + '</td></tr>';
      }).join('');
      return '<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>' + title + ' - ' + opts.id + '</title></head><body style="font-family:Inter,Arial,sans-serif;margin:0;background:#f3f4f6;">' +
        '<div style="max-width:800px;margin:24px auto;background:#fff;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,0.08);overflow:hidden;">' +
          '<div style="background:linear-gradient(90deg,#1A1B25,#00B2FF);color:#fff;padding:28px;display:flex;justify-content:space-between;align-items:center;">' +
            '<div><div style="font-size:20px;font-weight:800;">' + escapeHtml(opts.bizName) + '</div><div style="font-size:12px;opacity:0.85;">' + escapeHtml(opts.bizPhone) + ' · ' + escapeHtml(opts.bizAddress) + '</div></div>' +
            '<div style="text-align:right;"><div style="font-size:18px;font-weight:700;">' + title + '</div><div style="font-size:12px;margin-top:4px;">ID: ' + opts.id + '</div><div style="font-size:12px;">Date: ' + new Date(opts.date).toLocaleDateString() + '</div></div>' +
          '</div>' +
          '<div style="padding:28px;">' +
            '<div style="margin-bottom:18px;"><div style="font-size:12px;color:#64748b;font-weight:600;text-transform:uppercase;">Bill To</div><div style="font-weight:700;margin-top:4px;">' + escapeHtml(opts.customer) + '</div></div>' +
            '<table style="width:100%;border-collapse:collapse;"><thead><tr style="background:#1A1B25;color:#fff;"><th style="padding:12px;text-align:left;">Description</th><th style="padding:12px;text-align:right;">Amount</th></tr></thead><tbody>' + rows + '</tbody></table>' +
            '<div style="display:flex;justify-content:flex-end;margin-top:18px;"><div style="background:#f8fafc;padding:12px 18px;border-radius:8px;font-weight:700;color:#00B2FF;">TOTAL: TSh ' + total.toLocaleString() + '</div></div>' +
          '</div>' +
          '<div style="padding:20px 28px;background:#f8fafc;color:#6b7280;text-align:center;font-size:0.9rem;">Thank you for choosing ' + escapeHtml(opts.bizName) + ' — Quality service you can trust.</div>' +
        '</div></body></html>';
    }

    function previewDoc(docId) {
      var doc = allDocs.find(function(d) { return String(d.doc_id || d.id) === String(docId); });
      if (!doc) { showToast('Document not found', 'error'); return; }
      var html = doc.html || '<p>No preview available</p>';
      currentPreviewHtml = html;
      document.getElementById('previewContent').innerHTML = '<iframe srcdoc="' + html.replace(/"/g, '&quot;') + '" style="width:100%;height:500px;border:none;border-radius:8px;"></iframe>';
      document.getElementById('previewModal').style.display = 'flex';
    }

    function closePreviewModal() { document.getElementById('previewModal').style.display = 'none'; }
    document.getElementById('previewModalClose').addEventListener('click', closePreviewModal);
    document.getElementById('previewModalCloseBtn').addEventListener('click', closePreviewModal);
    document.getElementById('previewModal').addEventListener('click', function(e) { if (e.target === this) closePreviewModal(); });

    document.getElementById('downloadPdfBtn').addEventListener('click', function() {
      if (!currentPreviewHtml) return;
      try {
        var blob = new Blob([currentPreviewHtml], { type: 'text/html' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'document-' + Date.now() + '.html';
        a.click();
        URL.revokeObjectURL(url);
        showToast('Document exported', 'success');
      } catch (err) {
        showToast('Export failed: ' + err.message, 'error');
      }
    });

    async function deleteDocById(docId) {
      var confirmed = await confirmAction('Delete this document? This cannot be undone.');
      if (!confirmed) return;
      try {
        await window.api.delete('/documents/' + encodeURIComponent(docId));
        showToast('Document deleted', 'success');
        loadDocumentsPage();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    function showToast(message, type) {
      type = type || 'info';
      var container = document.getElementById('toastContainer');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toastContainer';
        container.className = 'toast-container';
        document.body.appendChild(container);
      }
      var toast = document.createElement('div');
      toast.className = 'toast toast-' + type;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(function() { if (toast.parentNode) toast.remove(); }, 5000);
    }

    function confirmAction(message) {
      return new Promise(function(resolve) {
        var modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = '<div class="modal-panel modal-panel-sm"><div class="modal-header"><h2>Confirm</h2></div><div class="modal-body"><p>' + escapeHtml(message) + '</p></div><div class="modal-footer"><button class="compact-btn compact-btn-outline" id="confirmNo">Cancel</button><button class="action-btn" id="confirmYes">Confirm</button></div></div>';
        document.body.appendChild(modal);
        modal.querySelector('#confirmYes').onclick = function() { modal.remove(); resolve(true); };
        modal.querySelector('#confirmNo').onclick = function() { modal.remove(); resolve(false); };
      });
    }

    function escapeHtml(s) {
      return String(s||'').replace(/[&<>"']/g, function(ch) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      initLayout({ title: 'Documents', activePage: 'documents' });
      document.getElementById('newDocBtn').addEventListener('click', openNewDocModal);
      loadDocumentsPage();
    });
  </script>
</body>
</html>
