<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Invoices — Hunter Auto</title>
  <link rel="stylesheet" href="styles-clean.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" role="navigation" aria-label="Main navigation">
      <div class="brand">
        <img src="../images/logo.jpg" alt="logo" width="36" height="36" onerror="this.style.display='none'" />
        <div>
          <div style="font-weight:900">Hunter Auto</div>
          <div class="small">Admin</div>
        </div>
      </div>

      <nav class="nav">
        <a href="index.html">Dashboard</a>
        <a href="documents.html">Documents</a>
        <a href="invoices.html" class="active">Invoices</a>
        <a href="clients.html">Clients</a>
        <a href="services.html">Services</a>
        <a href="reports.html">Reports</a>
        <a href="settings.html">Settings</a>
      </nav>

      <div class="small">v1.0 · Local-first · Supabase</div>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <div class="left">
          <button id="hamburger" class="hamburger" aria-label="Open menu">☰</button>
          <div class="brand"><h1>Invoices</h1></div>
        </div>
        <div class="actions">
          <button id="btn-new-invoice" class="action-btn">New Invoice</button>
        </div>
      </header>

      <section class="content">
        <div class="card" id="invoice-creator">
          <h2>Create Invoice</h2>
          <p>Create a new invoice for your clients.</p>
          
          <div class="form-row">
            <label>Invoice No <input id="invoiceNo" type="text" placeholder="INV-2025-XXX"></label>
            <label>Client <input id="invoiceClient" type="text" placeholder="Client name or ID"></label>
          </div>
          <div class="form-row">
            <label>Date <input id="invoiceDate" type="date"></label>
            <label>Due Date <input id="invoiceDueDate" type="date"></label>
          </div>
          <div class="form-section">
            <label>Items</label>
            <div class="form-row">
              <div id="invoiceServiceList" class="service-checkbox-list"></div>
              <div>
                <div id="selectedServicesTotal">Selected: TSh 0</div>
                <button id="addSelectedServiceBtn" class="action-btn">Add Selected</button>
              </div>
            </div>
            <div id="invoiceItems"></div>
            <button id="addInvoiceItemBtn" class="action-btn">Add Item</button>
          </div>
          <div class="form-row">
            <label>Total (TSh) <input id="invoiceTotal" type="number"></label>
          </div>
          <div class="form-group">
            <button id="saveInvoiceBtn" class="action-btn">Save Invoice (Local)</button>
            <button id="syncInvoicesBtn" class="action-btn">Sync Now</button>
          </div>
        </div>

        <div class="card" id="invoice-list">
          <h2>Saved Invoices</h2>
          <div id="invoicesList"></div>
        </div>
      </section>
    </main>

    <div id="successMessage" class="message success" style="display:none"></div>
    <div id="errorMessage" class="message error" style="display:none"></div>
  </div>

  <script src="admin.js"></script>
  <script>
    // Invoice-specific initialization (mobile menu is handled centrally in admin.js)
    document.addEventListener('DOMContentLoaded', function() {
      // initialize invoice UI elements referenced by admin.js
      if (typeof loadDocumentsList === 'function') loadDocumentsList();

      const addItemBtn = document.getElementById('addInvoiceItemBtn');
      if (addItemBtn) {
        addItemBtn.addEventListener('click', () => {
          const itemsDiv = document.getElementById('invoiceItems');
          const idx = itemsDiv.children.length;
          const row = document.createElement('div');
          row.innerHTML = `
            <input placeholder="Description" class="item-desc">
            <input type="number" placeholder="Qty" class="item-qty" value="1">
            <input type="number" placeholder="Unit (TSh)" class="item-unit" value="0">
            <button class="remove-item">Remove</button>
          `;
          itemsDiv.appendChild(row);
          if (typeof attachItemRowListeners === 'function') attachItemRowListeners(row);
          if (typeof updateInvoiceTotal === 'function') updateInvoiceTotal();
        });
      }

      // Populate services checkbox list for invoices
      if (typeof populateInvoiceServiceSelect === 'function') {
        populateInvoiceServiceSelect('invoiceServiceList').then?.(() => {});
      }
    });
  </script>
</body>
</html>
