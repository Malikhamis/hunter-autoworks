<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clients — Hunter Auto (New)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="ha-shell">
    <aside class="ha-sidebar" role="navigation">
      <div class="ha-brand"><img src="../images/logo.jpg" alt="logo"/><div class="ha-brand-text"><div class="ha-title">Hunter Auto</div><div class="ha-sub">Admin</div></div></div>
      <nav class="ha-nav">
        <a href="index.html" class="ha-nav-item">Dashboard</a>
        <a href="clients.html" class="ha-nav-item active">Clients</a>
        <a href="services.html" class="ha-nav-item">Services</a>
        <a href="documents.html" class="ha-nav-item">Documents</a>
        <a href="reports.html" class="ha-nav-item">Reports</a>
        <a href="settings.html" class="ha-nav-item">Settings</a>
      </nav>
      <div class="ha-version">v1.0</div>
    </aside>

    <main class="ha-main">
      <header class="ha-topbar">
        <button id="hamburger" class="ha-hamburger">☰</button>
        <h1 class="ha-page-title">Clients</h1>
        <div class="ha-actions"><button id="btn-new-client" class="ha-btn">New Client</button></div>
      </header>

      <section class="ha-content">
        <div class="ha-panel">
          <div class="ha-panel-header"><h3>Clients</h3></div>
          <div id="clients-list" class="ha-list clients-grid" aria-live="polite"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="../admin/admin.js"></script>
  <script src="init.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', ()=>{
      // admin.js expects initClientsPage; provide a lightweight initializer
      if (typeof initClientsPage === 'function') initClientsPage();
      // If admin.js exposes loadClients(), call it to populate clients-list
      if (typeof loadClients === 'function') loadClients();
    });
  </script>
</body>
</html>
